# 构建 Web 前端并部署到 GitHub Pages
# 仓库需在 Settings → Pages → Build and deployment 中选择 "GitHub Actions"
name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust and wasm-pack
        uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-pages-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-pages-

      # 章动：若无 data/IAU2000/tab5.3a.txt 则从 IERS 拉取并生成（VLBI 合并格式），供后续 .bin 与前端加载
      - name: Prepare nutation (章动)
        run: |
          if [ ! -f data/IAU2000/tab5.3a.txt ]; then
            python3 scripts/iers_nutation_to_tab53a.py
          else
            echo "data/IAU2000/tab5.3a.txt exists, skip fetch"
          fi

      - name: Build WASM (wasm-lib + wasm-lib-f64)
        run: ./scripts/build_wasm.sh --release

      # 补丁：若具备 VSOP87 + DE406 BSP 则生成 data/fit 赤道/黄道拟合表；否则沿用仓库内已有或前端显示「未加载」
      - name: Setup uv (for patch scripts)
        uses: astral-sh/setup-uv@v4
      - name: Prepare patch (补丁)
        run: |
          uv run --only-group chapront-fit python scripts/vsop87_de406_chapront_fit.py || true
          uv run --only-group chapront-fit python scripts/vsop87_de406_ecliptic_fit.py || true
        continue-on-error: true

      # 历表 + 拟合：由原始文件生成 .bin（含章动 tab5.3a、拟合表 vsop87-de406-icrs 若 .txt 存在），再压成 .bin.br
      - name: Generate ephemeris and patch .bin
        run: ./scripts/gen_ephemeris_bin.sh

      - name: Compress .bin to .br (ephemeris + patch)
        run: node scripts/compress_ephemeris_brotli.mjs

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Copy ephemeris data (raw + .bin + .br)
        working-directory: web
        run: npm run copy-data

      - name: Build web (Vite)
        working-directory: web
        env:
          # 项目站地址为 https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
